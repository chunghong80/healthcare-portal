<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>카드뉴스 / 웹진 뷰어</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f1f5f9;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            padding: 0;
            margin: 0;
        }

        .banner {
            width: 100%;
            max-width: 600px;
            height: 70px;
            background: #fff;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #e2e8f0;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .logo {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .webzine-title {
            margin-left: auto;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (min-width: 601px) {
            .banner {
                margin-top: 20px;
            }
        }

        @media (max-width: 600px) {
            body {
                background: #fff;
                justify-content: flex-start;
            }
            .banner {
                max-width: 100vw;
                border-radius: 0;
                padding: 15px;
                height: 60px;
            }
            .logo {
                height: 32px;
            }
            .webzine-title {
                font-size: 12px;
            }
        }

        .slider-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16 / 22;
            background: #fff;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            overflow: hidden;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        @media (min-width: 601px) {
            .slider-container {
                margin-bottom: 20px;
            }
        }

        @media (max-width: 600px) {
            .slider-container {
                width: 100vw;
                max-width: 100vw;
                aspect-ratio: 16 / 22;
                border-radius: 0;
                box-shadow: none;
            }
        }

        .slider-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        .slides-container {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
            will-change: transform;
        }

        .slide {
            min-width: 100%;
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.45);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .arrow.show {
            opacity: 1;
            pointer-events: auto;
        }

        .arrow:hover {
            background: rgba(0, 0, 0, 0.75);
            transform: translateY(-50%) scale(1.1);
        }

        .arrow.left {
            left: 20px;
        }

        .arrow.right {
            right: 20px;
        }

        .progress-indicator {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
        }

        #error-message {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        #error-message h2 {
            color: #ef4444;
            margin-bottom: 12px;
        }

        #error-message p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="error-message" style="display:none;">
        <h2>콘텐츠를 불러올 수 없습니다</h2>
        <p id="error-detail">요청한 카드뉴스 또는 웹진 콘텐츠가 존재하지 않거나 유효하지 않은 경로입니다.</p>
    </div>

    <div id="viewer-content" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="banner">
            <img src="고지혈증 1주차/img/logo.svg" alt="Logo" class="logo" id="logoImg">
            <span class="webzine-title" id="webzineTitle">웹진 타이틀</span>
        </div>

        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slides-container" id="slidesContainer">
                    <!-- Slides injected dynamically -->
                </div>
            </div>

            <button class="arrow left" id="prevBtn">‹</button>
            <button class="arrow right" id="nextBtn">›</button>
            <div class="progress-indicator" id="progressIndicator">1 / 1</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                showError("게시물 ID가 지정되지 않았습니다.");
                return;
            }

            // Load from localStorage
            let posts = [];
            try {
                posts = JSON.parse(localStorage.getItem('hc_archive_posts') || '[]');
            } catch(e) {
                showError("데이터베이스 접근 도중 오류가 발생했습니다.");
                return;
            }

            const post = posts.find(p => p.id === postId);
            if (!post) {
                showError("해당 ID의 콘텐츠를 찾을 수 없습니다. 삭제되었거나 존재하지 않는 게시물입니다.");
                return;
            }

            if (post.contentType !== 'webzine') {
                showError("이 콘텐츠는 일반 첨부글 유형이며 웹진 형태가 아닙니다.");
                return;
            }

            const slides = post.slides || [];
            if (slides.length === 0) {
                showError("웹진 슬라이드 파일들이 구성되어 있지 않습니다.");
                return;
            }

            // Set Title & Logo
            document.getElementById('webzineTitle').innerText = post.title;
            if (post.logo) {
                document.getElementById('logoImg').src = post.logo;
            } else {
                document.getElementById('logoImg').src = "고지혈증 1주차/img/logo.svg"; // Fallback to seed logo
            }

            // Inject Slides
            const slidesContainer = document.getElementById('slidesContainer');
            slidesContainer.innerHTML = slides.map((src, idx) => `
                <div class="slide">
                    <img src="${src}" alt="슬라이드 ${idx + 1}">
                </div>
            `).join('');

            // Hide error, show content
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('viewer-content').style.display = 'flex';

            // Slider Logic
            let currentSlide = 0;
            let showControls = true;
            let hideTimeout;
            const slideElements = document.querySelectorAll('.slide');
            const totalSlides = slideElements.length;
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const sliderWrapper = document.getElementById('sliderWrapper');
            const progressIndicator = document.getElementById('progressIndicator');

            function updateSlide() {
                slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
                updateButtons();
                progressIndicator.innerText = `${currentSlide + 1} / ${totalSlides}`;
            }

            function updateButtons() {
                // Hide prev arrow on first slide
                if (currentSlide === 0) {
                    prevBtn.classList.remove('show');
                } else {
                    if (showControls) {
                        prevBtn.classList.add('show');
                    }
                }

                // Hide next arrow on last slide
                if (currentSlide === totalSlides - 1) {
                    nextBtn.classList.remove('show');
                } else {
                    if (showControls) {
                        nextBtn.classList.add('show');
                    }
                }
            }

            function showButtons() {
                showControls = true;
                updateButtons();
                resetHideTimer();
            }

            function hideButtons() {
                showControls = false;
                prevBtn.classList.remove('show');
                nextBtn.classList.remove('show');
            }

            function resetHideTimer() {
                clearTimeout(hideTimeout);
                hideTimeout = setTimeout(() => {
                    hideButtons();
                }, 1500); // Hide after 1.5 seconds
            }

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                    showButtons();
                }
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                    showButtons();
                }
            });

            // Touch support for buttons
            prevBtn.addEventListener('touchend', (e) => {
                e.stopPropagation();
                e.preventDefault();
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                    showButtons();
                }
            });

            nextBtn.addEventListener('touchend', (e) => {
                e.stopPropagation();
                e.preventDefault();
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                    showButtons();
                }
            });

            // Mouse move detection inside wrapper
            sliderWrapper.addEventListener('mousemove', () => {
                showButtons();
            });

            // Touch start detection inside wrapper
            sliderWrapper.addEventListener('touchstart', () => {
                showButtons();
            }, { passive: true });

            sliderWrapper.addEventListener('click', (e) => {
                if (e.target === sliderWrapper || e.target.closest('.slide')) {
                    showButtons();
                }
            });

            // Drag / Swipe Gestures
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            let startTransform = 0;

            sliderWrapper.addEventListener('mousedown', handleDragStart);
            sliderWrapper.addEventListener('touchstart', handleDragStart, { passive: true });

            sliderWrapper.addEventListener('mousemove', handleDragMove);
            sliderWrapper.addEventListener('touchmove', handleDragMove, { passive: false });

            sliderWrapper.addEventListener('mouseup', handleDragEnd);
            sliderWrapper.addEventListener('touchend', handleDragEnd);
            sliderWrapper.addEventListener('mouseleave', handleDragEnd);

            function handleDragStart(e) {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                startTransform = currentSlide * 100;
                slidesContainer.style.transition = 'none';
            }

            function handleDragMove(e) {
                if (!isDragging) return;
                
                // Only prevent default on move touch if we are moving horizontally
                currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                const diff = currentX - startX;
                
                if (e.cancelable) {
                    e.preventDefault();
                }
                const percentMove = (diff / sliderWrapper.offsetWidth) * 100;
                slidesContainer.style.transform = `translateX(-${startTransform - percentMove}%)`;
            }

            function handleDragEnd(e) {
                if (!isDragging) return;
                
                isDragging = false;
                slidesContainer.style.transition = 'transform 0.5s ease-in-out';
                
                const diff = currentX - startX;
                const threshold = sliderWrapper.offsetWidth * 0.15; // 15% threshold
                
                if (Math.abs(diff) > threshold && currentX !== 0) {
                    if (diff > 0 && currentSlide > 0) {
                        currentSlide--;
                    } else if (diff < 0 && currentSlide < totalSlides - 1) {
                        currentSlide++;
                    }
                }
                
                updateSlide();
                startX = 0;
                currentX = 0;
            }

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                    showButtons();
                } else if (e.key === 'ArrowRight' && currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                    showButtons();
                }
            });

            // Initialize slider
            updateSlide();
            resetHideTimer();
        });

        function showError(msg) {
            document.getElementById('error-detail').innerText = msg;
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('viewer-content').style.display = 'none';
        }
    </script>
</body>
</html>
