<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사무포털 - 제공서비스 관리 (독립 데모 페이지)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%2317B890' d='M16 4C9.37 4 4 9.37 4 16c0 4.42 2.4 8.28 6 10.32V16c0-3.31 2.69-6 6-6s6 2.69 6 6c0 1.66-.67 3.16-1.76 4.24L24.49 24.5C26.66 22.31 28 19.31 28 16 28 9.37 22.63 4 16 4z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="admin.css">
  
  <style>
    /* Premium glassmorphic sandbox banner */
    .sandbox-banner {
      background: linear-gradient(90deg, #eff6ff 0%, #f5f3ff 100%);
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
    }
    .sandbox-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e40af;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .portal-demo-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .portal-demo-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="admin-layout">

    <!-- Sidebar Frame -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon" style="background:#2563eb;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        </div>
        <span class="logo-text">독립 개발 포털</span>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-group expanded">
          <div class="nav-group-title">헬스케어포털 관리</div>
          <a href="javascript:void(0)" class="nav-item" style="opacity:0.5; cursor:not-allowed;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            헬스케어 포털 메뉴설정
          </a>
          <a href="javascript:void(0)" class="nav-item" style="opacity:0.5; cursor:not-allowed;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            고객사 및 등급 관리
          </a>
          <a href="javascript:void(0)" class="nav-item active" id="sidebar-provided-services-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
            제공서비스 관리
          </a>
          <a href="javascript:void(0)" class="nav-item" style="opacity:0.5; cursor:not-allowed;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
            건강정보 관리
          </a>
        </div>
        <div class="nav-group expanded">
          <div class="nav-group-title">건강검진 관리</div>
          <a href="checkup_policy.html" class="nav-item" id="sidebar-checkup-policy-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            검진정책관리
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Content Frame -->
    <main class="main-content">
      <header class="top-header">
        <div class="breadcrumb">
          사무포털 <span class='separator'>></span> 헬스케어포털 관리 <span class='separator'>></span> <strong>제공서비스 관리</strong>
        </div>
        <div class="user-controls">
          <div class="profile-circle" style="background:#2563eb;">A</div>
          <span>Admin 님</span>
        </div>
      </header>

      <div class="content-wrapper">
        
        <!-- Sandbox Interactive Demonstration Banner -->
        <div class="sandbox-banner">
          <div class="sandbox-title">
            <span>💡</span> 
            <strong>[독립 실행 샌드박스]</strong> 기존 포털 파일 수정 없이 독립적으로 가동 중인 HTML 파일입니다.
          </div>
          <button class="portal-demo-btn" onclick="window.openPortalSandboxDemo()">
            🔍 최종 포털 서비스 안내 화면 데모 보기
          </button>
        </div>

        <div id="admin-main-view">
          <!-- Dynamic Administrative Content loaded here -->
        </div>

      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Global configurations required by scripts -->
  <script>
    // Global client configurations mock
    let adminClientConfigs = {
      kyobo: { id: "kyobo", name: "교보생명 (kyobo)", tiers: ["기본플랜", "VIP플랜"] },
      dasom: { id: "dasom", name: "교보다솜케어 (dasom)", tiers: ["통합등급", "우대등급"] },
      other: { id: "other", name: "A기업 (제휴사)", tiers: ["임직원 1등급", "임원급"] }
    };
    
    let currentView = "provided-services";

    // Re-route navigateTo specifically for this independent demo file
    window.navigateTo = function(viewId) {
      const container = document.getElementById('admin-main-view');
      const breadcrumb = document.querySelector('.breadcrumb');
      if (!container) return;

      if (viewId === 'provided-services') {
        if (breadcrumb) {
          breadcrumb.innerHTML = `사무포털 <span class='separator'>></span> 헬스케어포털 관리 <span class='separator'>></span> <strong>제공서비스 관리</strong>`;
        }
        window.renderProvidedServices(container);
      }
    };

    // Helper toast message simulator
    window.showToast = function(msg) {
      const tc = document.getElementById('toast-container');
      if (!tc) return;

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-icon">✓</div>
        <div class="toast-msg">${msg}</div>
      `;
      tc.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.4s ease-out forwards';
        setTimeout(() => toast.remove(), 400);
      }, 2500);
    };
  </script>

  <!-- Loaded standalone JS modules -->
  <script src="provided_services.js"></script>
  <script src="service_guide_portal.js"></script>

  <!-- Load Initial Content -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById('admin-main-view');
      if (container && window.renderProvidedServices) {
        window.renderProvidedServices(container);
      }
    });

    // -------------------------------------------------------------
    // SANDBOX EXCLUSIVE: Render Customer-Facing Portal Screen Demo
    // -------------------------------------------------------------
    window.openPortalSandboxDemo = function() {
      const modalId = 'portal-sandbox-demo-modal';
      if (document.getElementById(modalId)) return;

      const modal = document.createElement("div");
      modal.id = modalId;
      modal.style = "position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px);";

      modal.innerHTML = `
        <div style="background:#f1f5f9; width:1100px; height:90vh; border-radius:16px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); animation:modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
          
          <!-- Modal Header -->
          <div style="padding:16px 24px; background:white; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
            <div style="display:flex; align-items:center; gap:12px;">
              <span style="background:#10b981; color:white; font-size:12px; font-weight:800; padding:4px 10px; border-radius:4px;">포털 연동 데모</span>
              <h2 style="font-size:16px; font-weight:800; margin:0; color:#1e293b;">실제 고객이 보게 될 헬스케어포털 서비스 안내 연동 화면</h2>
            </div>
            <button style="background:none; border:none; font-size:24px; cursor:pointer; color:#64748b; line-height:1;" onclick="document.getElementById('${modalId}').remove()">&times;</button>
          </div>

          <!-- Selector controls -->
          <div style="padding:12px 24px; background:#fff; border-bottom:1px solid #e2e8f0; display:flex; gap:20px; align-items:center; font-size:13px; font-weight:700; color:#475569; flex-shrink:0;">
            <span>테스트 계정 선택:</span>
            <select id="sandbox-user-select" class="form-input" style="width:240px; padding:6px 12px; font-size:13px;" onchange="window.reloadPortalSandboxContent()">
              <option value="user_vip">👨‍💼 홍길동 (교보생명 VIP플랜 적용 고객)</option>
              <option value="user_basic">👩‍💼 김영희 (교보생명 기본플랜 적용 고객)</option>
              <option value="user_dasom">🏥 이다솜 (교보다솜케어 우대등급 적용 고객)</option>
            </select>
            <span style="font-size:12px; font-weight:500; color:#64748b;">* 계정을 변경하시면, 각 등급에 해당하는 제공서비스 관리 데이터가 실시간 연동/렌더링됩니다.</span>
          </div>

          <!-- Web Browser Simulation Frame -->
          <div style="flex:1; overflow:auto; padding:24px; background:#e2e8f0; display:flex; justify-content:center;">
            <div style="width:100%; max-width:960px; background:#fff; border-radius:12px; display:flex; flex-direction:column; overflow:auto; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); border:1px solid #cbd5e1;">
              
              <!-- Simulated Portal Navigation Bar -->
              <div style="background:#fff; border-bottom:2px solid #17B890; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
                <div style="font-weight:900; font-size:18px; color:#17B890; letter-spacing:-0.5px;" id="sandbox-sim-logo-text">교보생명 헬스케어 포털</div>
                <div style="display:flex; gap:20px; font-size:14px; font-weight:800; color:#475569;">
                  <span style="color:#17B890; border-bottom:2px solid #17B890; padding-bottom:4px;">서비스 안내</span>
                  <span>건강상담</span>
                  <span>병원안내</span>
                  <span>건강검진 예약</span>
                </div>
                <div style="font-size:13px; font-weight:700; color:#334155;" id="sandbox-sim-user-lbl">홍길동 님</div>
              </div>

              <!-- Main Workspace portal content -->
              <div style="padding:32px; flex:1;" id="portal-sandbox-render-target">
                <!-- Injected via service_guide_portal.js -->
              </div>

            </div>
          </div>

          <!-- Modal Footer -->
          <div style="padding:16px 24px; background:white; border-top:1px solid #e2e8f0; display:flex; justify-content:center; flex-shrink:0;">
            <button class="btn btn-secondary" style="padding:10px 40px; font-size:14px; font-weight:700;" onclick="document.getElementById('${modalId}').remove()">데모 닫기</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      // Define simulator state and mock app variables to satisfy portal code!
      window.reloadPortalSandboxContent = function() {
        const uType = document.getElementById('sandbox-user-select').value;
        const logo = document.getElementById('sandbox-sim-logo-text');
        const userLbl = document.getElementById('sandbox-sim-user-lbl');
        const target = document.getElementById('portal-sandbox-render-target');

        if (!target) return;

        // Mock state dynamically!
        window.state = {
          activeClient: { id: 'kyobo', name: '교보생명' },
          currentUser: { id: 'user_multi', name: '홍길동', tiers: { kyobo: ['VIP플랜'] } }
        };

        if (uType === 'user_vip') {
          logo.innerText = '교보생명 헬스케어 포털';
          userLbl.innerText = '홍길동 님';
          window.state.activeClient = { id: 'kyobo', name: '교보생명' };
          window.state.currentUser = { id: 'user_multi', name: '홍길동', tiers: { kyobo: ['VIP플랜'] } };
        } else if (uType === 'user_basic') {
          logo.innerText = '교보생명 헬스케어 포털';
          userLbl.innerText = '김영희 님';
          window.state.activeClient = { id: 'kyobo', name: '교보생명' };
          window.state.currentUser = { id: 'user_basic', name: '김영희', tiers: { kyobo: ['기본플랜'] } };
        } else if (uType === 'user_dasom') {
          logo.innerText = '교보다솜케어 포털';
          userLbl.innerText = '이다솜 님';
          window.state.activeClient = { id: 'dasom', name: '교보다솜케어' };
          window.state.currentUser = { id: 'user_single_dasom', name: '이다솜', tiers: { dasom: ['우대등급'] } };
        }

        // Apply dynamic brand primary color if exists
        let themeColor = "#17B890";
        if (window.state.activeClient.id === 'kyobo' && uType === 'user_vip') themeColor = "#2563eb";
        else if (window.state.activeClient.id === 'dasom') themeColor = "#0d9488";
        
        document.documentElement.style.setProperty('--theme-color', themeColor);
        // RGB split for gradients
        if (themeColor === '#2563eb') document.documentElement.style.setProperty('--theme-color-rgb', '37, 99, 235');
        else if (themeColor === '#0d9488') document.documentElement.style.setProperty('--theme-color-rgb', '13, 148, 136');
        else document.documentElement.style.setProperty('--theme-color-rgb', '23, 184, 144');

        // Execute rendering!
        if (window.renderServiceGuidePortal) {
          window.renderServiceGuidePortal(target);
        }
      };

      // Load initial simulation content
      window.reloadPortalSandboxContent();
    };
  </script>
</body>
</html>
