<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%2317B890' d='M16 4C9.37 4 4 9.37 4 16c0 4.42 2.4 8.28 6 10.32V16c0-3.31 2.69-6 6-6s6 2.69 6 6c0 1.66-.67 3.16-1.76 4.24L24.49 24.5C26.66 22.31 28 19.31 28 16 28 9.37 22.63 4 16 4z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="admin.css">
  
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --success-color: #17B890;
      --theme-color-rgb: 37, 99, 235;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    /* Premium Tab System */
    .tabs-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }
    
    .tab-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #64748b;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover {
      color: #1e293b;
      background: #f1f5f9;
    }

    .tab-btn.active {
      color: var(--primary-color);
      background: #eff6ff;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Premium stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin-top: 4px;
    }

    .stat-label {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: #eff6ff;
      color: var(--primary-color);
    }

    /* Custom Category management layout */
    .category-mgmt-layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Search panel inside stat log */
    .search-panel {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    .search-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    /* Table styles */
    .premium-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    .premium-table th {
      background: #f8fafc;
      padding: 14px 16px;
      font-weight: 700;
      color: #475569;
      border-bottom: 2px solid #e2e8f0;
    }

    .premium-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      color: #334155;
    }

    .premium-table tr:hover {
      background-color: #fafbfd;
    }

    /* Visual Editor Layout overrides */
    .canvas-editor-wrapper {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .editor-btn {
      height: 30px;
      padding: 0 10px;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.15s ease;
    }

    .editor-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .editor-btn.active {
      background: #eff6ff;
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    /* Draggable/Resizable shape elements in Visual Canvas */
    .canvas-element {
      box-sizing: border-box;
      transition: border 0.15s;
    }
    .canvas-element.selected {
      outline: none;
    }

    .resize-knob {
      display: none;
    }
    .canvas-element.selected .resize-knob {
      display: block;
    }

    .roundness-knob {
      display: none;
    }
    .canvas-element.selected .roundness-knob {
      display: block;
    }

    /* Badge tags */
    .badge-premium {
      display: inline-block;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 100px;
      text-align: center;
    }

    .badge-primary {
      background: #eff6ff;
      color: var(--primary-color);
      border: 1px solid #bfdbfe;
    }

    .badge-success {
      background: #e6fcf5;
      color: #0ca678;
      border: 1px solid #c3fae8;
    }

    .badge-warning {
      background: #fff9db;
      color: #f08c00;
      border: 1px solid #ffe3e3;
    }
    
    .badge-gray {
      background: #f1f3f5;
      color: #495057;
      border: 1px solid #e9ecef;
    }
  </style>
</head>
