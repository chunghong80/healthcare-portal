          <a href="hospital_schedule.html" class="nav-item" id="sidebar-hospital-schedule-btn">

    <!-- Main Content Frame -->
    <main class="main-content">
      <header class="top-header">
        <div class="breadcrumb">
          사무포털 <span class='separator'>></span> 건강검진 관리 <span class='separator'>></span> <strong>검진정책관리</strong>
        </div>
        <div class="user-controls">
          <div class="profile-circle" style="background:#2563eb;">A</div>
          <span>Admin 님</span>
        </div>
      </header>

      <div class="content-wrapper">
        
        <!-- Sandbox Interactive Demonstration Banner -->
        <div class="sandbox-banner">
          <div class="sandbox-title">
            <span>💡</span> 
            <strong>[독립 실행 샌드박스]</strong> 기존 포털 파일 수정 없이 독립적으로 가동 중인 HTML 파일입니다.
          </div>
        </div>

        <div id="admin-main-view">
          <!-- Dynamic Administrative Content loaded here -->
        </div>

      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Global configurations required by scripts -->
  <script>
    // Global client configurations mock
    let adminClientConfigs = {
      kyobo: { id: "kyobo", name: "교보생명 (kyobo)", tiers: ["기본플랜", "VIP플랜"] },
      dasom: { id: "dasom", name: "교보다솜케어 (dasom)", tiers: ["통합등급", "우대등급"] },
      other: { id: "other", name: "A기업 (제휴사)", tiers: ["임직원 1등급", "임원급"] }
    };
    
    let currentView = "support-policy";

    window.navigateTo = function(viewId, mode) {
      const container = document.getElementById('admin-main-view');
      const breadcrumb = document.querySelector('.breadcrumb');
      if (!container) return;

      if (viewId === 'support-policy') {
        if (breadcrumb) {
          breadcrumb.innerHTML = `사무포털 <span class='separator'>></span> 건강검진 관리 <span class='separator'>></span> <strong>검진정책관리</strong>`;
        }
        window.renderSupportPolicy(container);
      } else if (viewId === 'support-policy-create') {
        if (breadcrumb) {
          breadcrumb.innerHTML = `사무포털 <span class='separator'>></span> 건강검진 관리 <span class='separator'>></span> 검진정책관리 <span class='separator'>></span> <strong>등록 및 수정</strong>`;
        }
        window.currentPolicyMode = mode || 'create';
        window.renderSupportPolicyCreate(container);
      }
    };

    // Helper toast message simulator
    window.showToast = function(msg) {
      const tc = document.getElementById('toast-container');
      if (!tc) return;

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-icon">✓</div>
        <div class="toast-msg">${msg}</div>
      `;
      tc.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.4s ease-out forwards';
        setTimeout(() => toast.remove(), 400);
      }, 2500);
    };
  </script>

  <!-- Loaded standalone JS modules -->
  <script src="checkup_policy.js"></script>

  <!-- Load Initial Content -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById('admin-main-view');
      if (container && window.renderSupportPolicy) {
        window.renderSupportPolicy(container);
      }
    });
  </script>
</body>
</html>
